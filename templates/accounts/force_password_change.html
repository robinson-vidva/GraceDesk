{% extends "base.html" %}
{% block title %}Change Password — {{ church_settings.church_name }}{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-yellow-50 to-orange-100 flex items-center justify-center px-4 py-12">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="text-center mb-6">
        <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-6 h-6 text-yellow-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900">Password Change Required</h2>
        <p class="text-gray-600 text-sm mt-1">You must change your password before continuing.</p>
      </div>

      {% if error %}
      <div class="mb-4 bg-red-50 border border-red-300 text-red-700 rounded-md px-4 py-3 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
            <input type="password" id="password" name="password" required minlength="8"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            <p class="text-xs text-gray-500 mt-1">Minimum 8 characters</p>
          </div>
          <div>
            <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
            <input type="password" id="password2" name="password2" required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
          </div>
          <button type="submit" class="w-full btn-primary py-2.5 rounded-lg font-semibold text-sm">
            Change Password
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
