{% extends "base.html" %}
{% block title %}Login — GraceDesk{% endblock %}

{% block content %}
<div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-gray-900">GraceDesk</h2>
    <p class="mt-2 text-center text-sm text-gray-600">Church Management System</p>
</div>

<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-lg sm:rounded-lg sm:px-10">
        <h3 class="text-lg font-semibold text-gray-900 mb-6">Sign in to your account</h3>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            {% if form.errors %}
            <div class="rounded-md bg-red-50 p-4 border border-red-200">
                <p class="text-sm text-red-700">Invalid username or password. Please try again.</p>
            </div>
            {% endif %}
            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" id="id_username" required autofocus
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm">
            </div>
            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" id="id_password" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm">
            </div>
            <div>
                <button type="submit" class="flex w-full justify-center rounded-md bg-primary-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
