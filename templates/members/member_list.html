{% extends "base.html" %}
{% block title %}Members — GraceDesk{% endblock %}

{% block page_actions %}
<a href="{% url 'members:create' %}" class="rounded-md bg-primary-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-500">+ Add Member</a>
{% endblock %}

{% block content %}
<!-- Search & Filter -->
<div class="mb-6 bg-white shadow rounded-lg p-4">
    <form method="get" class="flex flex-col sm:flex-row gap-3">
        <div class="flex-1">
            <input type="text" name="q" value="{{ search_query }}" placeholder="Search members..."
                   class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-primary-500 focus:ring-primary-500"
                   hx-get="{% url 'members:list' %}" hx-trigger="keyup changed delay:300ms" hx-target="#member-table" hx-include="[name='status']">
        </div>
        <div>
            <select name="status" class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-primary-500 focus:ring-primary-500"
                    hx-get="{% url 'members:list' %}" hx-trigger="change" hx-target="#member-table" hx-include="[name='q']">
                <option value="">All Statuses</option>
                {% for value, label in status_choices %}
                <option value="{{ value }}" {% if status_filter == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
    </form>
</div>

<div id="member-table">
    {% include "members/partials/member_table.html" %}
</div>
{% endblock %}
