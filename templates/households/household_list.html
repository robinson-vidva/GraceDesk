{% extends "base.html" %}
{% block title %}Households — GraceDesk{% endblock %}

{% block page_actions %}
<a href="{% url 'households:create' %}" class="rounded-md bg-primary-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-500">+ Add Household</a>
{% endblock %}

{% block content %}
<div class="mb-6 bg-white shadow rounded-lg p-4">
    <form method="get">
        <input type="text" name="q" value="{{ search_query }}" placeholder="Search households..."
               class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-primary-500 focus:ring-primary-500"
               hx-get="{% url 'households:list' %}" hx-trigger="keyup changed delay:300ms" hx-target="#household-table">
    </form>
</div>

<div id="household-table">
    {% include "households/partials/household_table.html" %}
</div>
{% endblock %}
